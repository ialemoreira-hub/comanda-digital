<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-text">Comanda Digital</span>
    </div>

    <h2 class="auth-title">Entrar na conta</h2>
    <p class="auth-subtitle">Acesse sua conta para fazer pedidos</p>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="seu@email.com" />
    </div>

    <div class="form-group">
      <label>Senha</label>
      <input type="password" [(ngModel)]="senha" placeholder="Sua senha" (keyup.enter)="login()" />
    </div>

    @if (erro) {
      <div class="alert-erro">{{ erro }}</div>
    }

    <button class="btn-primary" (click)="login()">Entrar</button>

    <p class="auth-link">
      Não tem conta? <a routerLink="/cadastro">Cadastre-se</a>
    </p>
  </div>
</div>
