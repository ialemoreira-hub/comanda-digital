<div class="auth-container">
  <div class="auth-card">
    <h2>📝 Criar Conta</h2>
    <p class="auth-subtitle">Cadastre-se para fazer seus pedidos</p>

    <div class="form-group">
      <label>Nome completo</label>
      <input type="text" [(ngModel)]="nome" placeholder="Seu nome" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="seu@email.com" />
    </div>

    <div class="form-group">
      <label>Telefone</label>
      <input type="text" [(ngModel)]="telefone" placeholder="(11) 99999-9999" />
    </div>

    <div class="form-group">
      <label>Senha</label>
      <input type="password" [(ngModel)]="senha" placeholder="Mínimo 6 caracteres" />
    </div>

    <div class="form-group">
      <label>Confirmar Senha</label>
      <input type="password" [(ngModel)]="confirmarSenha" placeholder="Repita a senha" />
    </div>

    <div class="alert-erro" *ngIf="erro">{{ erro }}</div>
    <div class="alert-sucesso" *ngIf="sucesso">{{ sucesso }}</div>

    <button class="btn-primary" (click)="cadastrar()">Criar Conta</button>

    <p class="auth-link">
      Já tem conta? <a routerLink="/login">Entrar</a>
    </p>
  </div>
</div>
