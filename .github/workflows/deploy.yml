name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Fix beasties bug
        run: sed -i 's/link\.parentNode?\.insertBefore/link.parentNode \&\& link.parentNode.insertBefore/g' node_modules/@angular/build/node_modules/beasties/dist/index.cjs

      - name: Build
        run: npx ng build --configuration=production

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive